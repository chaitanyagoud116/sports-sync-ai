services:
  postgres:
    image: postgres:16-alpine
    container_name: sportssync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sportssync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sportssync_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sportssync}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportssync} -d ${POSTGRES_DB:-sportssync}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sportssync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

name: Sports Sync AI CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Prisma Generate
      run: npx prisma generate
      
    - name: Check types
      run: npx tsc --noEmit
      
    - name: Lint
      run: npm run lint
      
    - name: Build
      run: npm run build
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/sportssync_test?schema=public"
        NEXTAUTH_SECRET: "ci-test-secret-123456789012345678901234"
        NEXTAUTH_URL: "http://localhost:3000"
